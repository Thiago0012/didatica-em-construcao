<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="titulo desc">
  <title id="titulo">Aula em construção</title>
  <desc id="desc">Imagem provisória para aulas futuras com espaço para pontos interativos e dossiê.</desc>
  <defs>
    <linearGradient id="bg" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f9efe0"/>
      <stop offset="0.45" stop-color="#eef7ff"/>
      <stop offset="1" stop-color="#e8f6ef"/>
    </linearGradient>
    <linearGradient id="card" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.88"/>
      <stop offset="1" stop-color="#d9ecff" stop-opacity="0.66"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="26" stdDeviation="22" flood-color="#18324d" flood-opacity="0.18"/>
    </filter>
  </defs>

  <rect width="1600" height="1000" fill="url(#bg)"/>
  <circle cx="230" cy="170" r="210" fill="#7dccff" opacity="0.22"/>
  <circle cx="1320" cy="780" r="260" fill="#0f9d7a" opacity="0.18"/>
  <circle cx="1260" cy="170" r="180" fill="#f08a24" opacity="0.16"/>

  <g opacity="0.14" stroke="#1553a5" stroke-width="3" fill="none">
    <path d="M255 650 C470 510, 595 510, 755 650 S1075 780, 1325 600"/>
    <path d="M315 310 C520 220, 675 260, 820 395 S1095 550, 1295 395"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="170" y="180" width="1260" height="640" rx="70" fill="url(#card)" stroke="#ffffff" stroke-opacity="0.72" stroke-width="4"/>
  </g>

  <g transform="translate(270 270)">
    <rect x="0" y="0" width="290" height="220" rx="42" fill="#ffffff" opacity="0.82" stroke="#1553a5" stroke-opacity="0.14"/>
    <rect x="42" y="54" width="206" height="22" rx="11" fill="#1d6fd9" opacity="0.2"/>
    <rect x="42" y="96" width="158" height="22" rx="11" fill="#0f9d7a" opacity="0.22"/>
    <rect x="42" y="138" width="190" height="22" rx="11" fill="#f08a24" opacity="0.22"/>
  </g>

  <g transform="translate(655 250)">
    <rect x="0" y="0" width="290" height="260" rx="42" fill="#ffffff" opacity="0.9" stroke="#1553a5" stroke-opacity="0.14"/>
    <circle cx="145" cy="96" r="54" fill="#1d6fd9" opacity="0.18"/>
    <path d="M120 96 h50 M145 71 v50" stroke="#1553a5" stroke-width="16" stroke-linecap="round"/>
    <rect x="54" y="180" width="182" height="20" rx="10" fill="#182230" opacity="0.14"/>
  </g>

  <g transform="translate(1040 270)">
    <rect x="0" y="0" width="290" height="220" rx="42" fill="#ffffff" opacity="0.82" stroke="#1553a5" stroke-opacity="0.14"/>
    <path d="M70 70 h150 M70 112 h150 M70 154 h106" stroke="#182230" stroke-width="18" stroke-linecap="round" opacity="0.16"/>
    <circle cx="226" cy="154" r="24" fill="#0f9d7a" opacity="0.28"/>
  </g>

  <g fill="#1553a5" opacity="0.92" font-family="Georgia, 'Times New Roman', serif" text-anchor="middle">
    <text x="800" y="625" font-size="74" font-weight="700">Aula em construção</text>
    <text x="800" y="690" font-size="30" font-family="'Trebuchet MS', sans-serif" fill="#4d5a6a">Imagem-resumo, pontos interativos e dossiê prontos para receber conteúdo</text>
  </g>
</svg>
